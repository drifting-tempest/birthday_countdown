<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>bday countdown</title>
        <link rel="stylesheet" href="">
    </head>

    <div class="card">
        <h>birthday countdown !!</h>
        <p>this is for april 14 btw :D</p>

        <div class="timer">
            <div class="box">
                <span id="days" class="num">0</span>
                <span class="label">days</span>
            </div>

            <div class="box">
                <span id="hours" class="num">0</span>
                <span class="label">hours</span>
            </div>

            <div class="box">
                <span id="minutes" class="num">0</span>
                <span class="label">minutes</span>
            </div>

            <div class="box">
                <span id="seconds" class="num">0</span>
                <span class="label">seconds</span>
            </div>
        </div>
    </div>

    <div class="footer-div">
        <footer class="footer">made with love, sakura</footer>
    </div>

</html>
